<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Cat Shop - Customer Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
       
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
        }

        .bg-image {
            background-image: url('background.png'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            height: 100%;
            position: relative;
        }

        
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); 
        }

       
        .login-card {
            background: rgba(18, 18, 18, 0.6) !important; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(201, 162, 91, 0.5); 
            color: #ffffff; 
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

       
        .text-gold {
            color: #c9a25b !important; 
        }

        .btn-gold {
            background-color: #c9a25b; 
            color: #121212; 
            border: none;
            transition: background 0.3s ease;
        }

        .btn-gold:hover {
            background-color: #e0b86a; 
            color: #121212;
        }

        
        .form-control-dark {
            background-color: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .form-control-dark:focus {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #c9a25b; 
            color: #fff;
            box-shadow: none;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="bg-overlay"></div> 
        
        <div class="container d-flex justify-content-center align-items-center h-100 position-relative">
            <div class="card p-5 shadow login-card" style="width: 420px;">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-gold mb-0">Amazing Cat Shop</h2>
                    <h5 class="text-white fw-light mb-2">E-Commerce & Catalog</h5>
                    <p class="text-muted small">Exclusive Member Portal</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-white small">Username / Email</label>
                        <input type="text" id="username" class="form-control form-control-lg form-control-dark" required placeholder="meow.customer">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white small">Password</label>
                        <input type="password" id="password" class="form-control form-control-lg form-control-dark" required placeholder="••••••••••">
                    </div>

                    <div id="errorMessage" class="alert alert-danger d-none py-2 px-3 small">
                        Access Denied. Please fill in all fields.
                    </div>

                    <button type="submit" class="btn btn-gold btn-lg w-100 py-3 mt-3 fw-bold shadow">LOGIN TO CATALOG</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            
            if (user !== "" && pass !== "") {
                
                // ==========================================================
            
                localStorage.setItem('isLoggedIn', 'true');
                // ==========================================================

                alert('Welcome back, Cat Lover! Redirecting to Amazing Cat Shop...');
                
              
                window.location.href = 'menu.html'; 
            } else {
               
                document.getElementById('errorMessage').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
